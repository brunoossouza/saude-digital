<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saúde Digital — Agendamento de Consulta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --verde:#0B6B4A;--verde-mid:#138A5F;--verde-light:#1aaa76;
  --verde-bg:#EAF5F0;--verde-pale:#f2faf6;
  --text:#111c17;--muted:#5a7367;--border:#cde3d8;--white:#ffffff;--radius:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--verde-pale);min-height:100vh;padding:0 0 48px;}
.page{max-width:640px;margin:0 auto}
.header-banner{background:#045938;padding:28px 36px;display:flex;align-items:center;gap:20px;border-radius:20px 20px 0 0;}
.header-logo{width:68px;height:68px;border-radius:14px;background:#1db86a;display:flex;align-items:flex-start;justify-content:center;flex-shrink:0;overflow:hidden;padding-top:6px;}
.header-logo span{color:#fff;font-size:48px;font-weight:300;line-height:1;}
.header-title{font-family:'DM Sans',sans-serif;font-size:32px;font-weight:700;color:#fff;letter-spacing:0.5px;line-height:1.1;}
.header-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:.15em;text-transform:uppercase;margin-top:4px;}
.card{background:var(--white);border-radius:0 0 20px 20px;border:1px solid var(--border);border-top:none;overflow:hidden;margin-bottom:24px;}
.form-title{padding:28px 36px 0;}
.form-title h2{font-size:22px;font-weight:400;color:var(--text);margin-bottom:8px;}
.form-title p{font-size:13px;color:var(--muted);line-height:1.5;padding-bottom:20px;border-bottom:1px solid var(--border);}
.prog-wrap{background:var(--verde-bg);padding:16px 36px;border-bottom:1px solid var(--border);}
.prog-labels{display:flex;gap:0;margin-bottom:10px;}
.prog-step{flex:1;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--muted);transition:color .3s;}
.prog-step.done,.prog-step.cur{color:var(--verde)}
.prog-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--muted);transition:all .3s;}
.prog-step.done .prog-dot{background:var(--verde);border-color:var(--verde);color:#fff}
.prog-step.cur .prog-dot{background:var(--verde-bg);border-color:var(--verde);color:var(--verde)}
.prog-line{height:2px;background:var(--border);border-radius:2px;}
.prog-fill{height:100%;background:var(--verde);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.form-body{padding:28px 36px 36px}
.step{display:none}.step.active{display:block}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--verde-mid);margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--verde-bg);}
.field{margin-bottom:18px}
.field label{display:flex;font-size:13px;font-weight:500;color:var(--text);margin-bottom:7px;align-items:center;gap:4px;}
.req{color:#e05c5c;font-size:12px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;appearance:none;-webkit-appearance:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--verde-mid);box-shadow:0 0 0 4px rgba(19,138,95,.1);}
.field input::placeholder,.field textarea::placeholder{color:#aac0b8}
.field textarea{resize:none;height:88px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.select-wrap{position:relative}
.select-wrap i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
.info-box{background:var(--verde-bg);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;display:flex;gap:10px;align-items:flex-start;}
.info-box i{color:var(--verde);font-size:18px;margin-top:1px;flex-shrink:0}
.info-box p{font-size:13px;color:var(--verde);line-height:1.55}
.resumo{background:var(--verde-bg);border-radius:var(--radius);padding:16px 18px;margin-bottom:22px;}
.resumo-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;border-bottom:1px solid rgba(11,107,74,.1);}
.resumo-row:last-child{border-bottom:none}
.resumo-row span:first-child{color:var(--muted)}
.resumo-row span:last-child{font-weight:500;color:var(--text)}
.btn-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:24px;}
.btn{padding:12px 24px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:7px;transition:all .18s;}
.btn-back{background:var(--verde-bg);color:var(--verde);border:1.5px solid var(--border);}
.btn-back:hover{background:var(--border)}
.btn-next{background:var(--verde);color:#fff;margin-left:auto;}
.btn-next:hover{background:var(--verde-mid)}
.btn-next:active{transform:scale(.97)}
.success-wrap{text-align:center;padding:8px 0 16px}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--verde-bg);margin:0 auto 20px;display:flex;align-items:center;justify-content:center;}
.success-icon i{font-size:28px;color:var(--verde)}
.success-wrap h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:10px;}
.success-wrap p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.proto-badge{display:inline-block;padding:10px 22px;background:var(--verde-bg);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--verde);letter-spacing:.04em;margin-bottom:24px;}
.whats-note{display:flex;align-items:center;gap:8px;justify-content:center;font-size:13px;color:var(--muted);}
.whats-dot{width:8px;height:8px;border-radius:50%;background:#25D366}
.footer{text-align:center;margin-top:8px;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px;padding-bottom:16px;}
.footer i{font-size:14px;color:var(--verde)}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(11,107,74,.08);z-index:100;align-items:center;justify-content:center;}
.loading-overlay.show{display:flex}
.loading-box{background:#fff;border-radius:16px;padding:28px 36px;text-align:center;box-shadow:0 8px 32px rgba(11,107,74,.15);}
.loading-box p{font-size:14px;color:var(--verde);font-weight:500;margin-top:12px;}
.spinner{width:36px;height:36px;border:3px solid var(--verde-bg);border-top-color:var(--verde);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="loading-box"><div class="spinner"></div><p>Registrando agendamento...</p></div>
</div>
<div class="page">
  <div class="header-banner">
    <div class="header-logo"><span>+</span></div>
    <div>
      <div class="header-title">Saúde Digital</div>
      <div class="header-sub">AUTOMAÇÃO EM SAÚDE</div>
    </div>
  </div>
  <div class="card">
    <div class="form-title">
      <h2>Saúde Digital — Agendamento de Consulta</h2>
      <p>Sistema oficial de agendamento de consultas da Prefeitura Municipal</p>
    </div>
    <div class="prog-wrap">
      <div class="prog-labels">
        <div class="prog-step cur" id="ps1"><div class="prog-dot" id="pd1">1</div>Dados do paciente</div>
        <div class="prog-step" id="ps2"><div class="prog-dot" id="pd2">2</div>Consulta</div>
        <div class="prog-step" id="ps3"><div class="prog-dot" id="pd3">3</div>Confirmar</div>
      </div>
      <div class="prog-line"><div class="prog-fill" id="prog" style="width:0%"></div></div>
    </div>
    <div class="form-body">
      <div class="step active" id="s1">
        <div class="sec-title">Dados do paciente</div>
        <div class="field">
          <label>Nome completo <span class="req">*</span></label>
          <input type="text" id="f-nome
